<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אתי גינזבורג | כל הקטלוגים</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600&family=Frank+Ruhl+Libre:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --color-primary: #4a2e1b;
            --color-secondary: #b37a54;
            --color-accent: #d8a273;
            --color-bg: #fdfaf6;
            --color-surface: rgba(255, 255, 255, 0.7);
            --shadow-soft: 0 10px 30px rgba(74, 46, 27, 0.04);
            --shadow-hover: 0 20px 40px rgba(179, 122, 84, 0.15);
            --transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--color-bg);
            color: var(--color-primary);
            background-image: 
                radial-gradient(circle at 15% 0%, rgba(216, 162, 115, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 85% 100%, rgba(179, 122, 84, 0.08) 0%, transparent 40%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3, .serif { font-family: 'Frank Ruhl Libre', serif; }

        .container {
            width: 100%;
            max-width: 1000px;
            padding: 0 25px;
            margin: 0 auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-top: 60px;
            margin-bottom: 50px;
            animation: fadeInDown 1s ease-out;
        }

        .logo {
            max-width: 280px;
            animation: float 6s ease-in-out infinite;
        }

        .subtitle {
            font-size: 1.6rem;
            color: var(--color-secondary);
            font-weight: 400;
            margin-top: 10px;
        }

        .catalogs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
            width: 100%;
            margin-bottom: 60px;
        }

        .catalog-card {
            background: var(--color-surface);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            text-decoration: none;
            color: var(--color-primary);
            box-shadow: var(--shadow-soft);
            border: 1px solid rgba(216, 162, 115, 0.2);
            transition: var(--transition);
            animation: fadeInUp 0.8s backwards;
        }

        .catalog-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-hover);
            background: #fff;
        }

        .card-icon { font-size: 2.8rem; color: var(--color-secondary); margin-bottom: 20px; }
        .card-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; }

        .alternatives-section {
            width: 100%;
            text-align: center;
            margin-bottom: 80px;
            padding-top: 50px;
            border-top: 1px solid rgba(216, 162, 115, 0.3);
        }

        .alt-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        .alt-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .btn-whatsapp { background-color: #25D366; color: #fff; }
        .btn-whatsapp:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2); }

        .btn-email { background-color: var(--color-primary); color: var(--color-bg); }
        .btn-email:hover { background-color: var(--color-secondary); color: #fff; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(179, 122, 84, 0.2); }

        .btn-drive { border: 1px solid #1FA463; color: #1FA463; flex-direction: column; padding: 10px 25px; }
        .btn-drive:hover { background-color: #f0fdf4; transform: translateY(-3px); }
        .btn-drive .note { font-size: 0.8rem; font-weight: 400; }

        /* פוטר */
        footer {
            background: linear-gradient(135deg, var(--color-primary), #2c1e16);
            color: var(--color-bg);
            padding: 50px 20px 30px;
            text-align: center;
        }

        .contact-row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
            margin-top: 20px;
        }

        .contact-item {
            color: #e6d3c5;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .contact-item:hover { color: #fff; }
        .contact-item i { color: var(--color-accent); }
        
        .address-item {
            cursor: default;
        }
        .address-item:hover { color: #e6d3c5; } /* ביטול שינוי צבע בהובר לכתובת */

        .insta-icon { font-size: 1.4rem; }

        /* כפתור תיאום פגישה בפוטר */
        .footer-booking-wrapper {
            margin-top: 35px;
            margin-bottom: 10px;
        }

        .footer-btn-booking {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 30px;
            background-color: transparent;
            color: var(--color-accent);
            border: 1px solid var(--color-accent);
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: var(--transition);
        }

        .footer-btn-booking:hover {
            background-color: var(--color-accent);
            color: var(--color-primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(216, 162, 115, 0.2);
        }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        @media (max-width: 768px) {
            .alt-buttons { flex-direction: column; }
            .alt-btn { width: 100%; }
            .footer-btn-booking { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>

        </main>
    </div>

    <footer>
        <div class="footer-content">
            <h2 class="serif" style="color: var(--color-accent); font-size: 2rem;">Eti Ginzburg</h2>
            
            <div class="contact-row">
                <a href="https://www.instagram.com/etiginzburg_dress" target="_blank" class="contact-item">
                    <i class="fa-brands fa-instagram insta-icon"></i> <span dir="ltr">@etiginzburg_dress</span>

            <p style="margin-top: 35px; font-size: 0.85rem; opacity: 0.4; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px;">

</body>
</html>
